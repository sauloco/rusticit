    <meta name="description" content="" />

    />
    <meta
      property="og:description"
      content="Rustic Information & Technology. Javascript experts. We build robust yet modern digital experiences. Software for mobile and web. Designing, consulting and development."
    />
    <meta
      property="og:image"

    <link rel="icon" type="image/svg" href="assets/R.svg" />
    <link rel="stylesheet" defer href="style.css" />
    <link
      href="https://fonts.googleapis.com/css2?family=Rubik:wght@700&display=swap"
      defer
      crossorigin=""
      rel="stylesheet"
    />
    <script type="module">
      import { Gradient } from './gradients.js';

      window.addEventListener('DOMContentLoaded', () => {
        const gradient = new Gradient();
        gradient.initGradient('#gradient-canvas');
      });
    </script>
    <style>
      .fade-in-element {
        opacity: 0;
        transform: translateY(20px);
        transition: opacity 0.8s ease-out, transform 0.8s ease-out;
      }

      .fade-in-element.visible {
        opacity: 1;
        transform: translateY(0);
      }
    </style>
  </head>
  <body class="load light-mode">
    <section class="hero-wrapper" style="height: 100vh">
      <div class="bg">
        <canvas id="gradient-canvas" data-transition-in> </canvas>
      </div>

      <div
        class="hero hide"
        style="
          background-color: var(--white);
          opacity: 70%;
          padding: 3rem;
          border-radius: 1rem;
          backdrop-filter: blur(10px);
        "
      >
        <img
          class="logo fade-in-element"
          src="assets/rustic_logo_light.svg"
          alt="Our company logo in big letters it reads Rustic"
        />
        <img
          class="logo for-dark fade-in-element"
          src="assets/rustic_gradient_logo_dark.svg"
          alt="Our company logo in big letters it reads Rustic"
        />
        <h2 class="centered fade-in-element">
          <strong id="hero-zero">Information & Technology</strong>
        </h2>
        <h2 class="centered fade-in-element" style="font-size: 3rem">
          <strong>2025 Wrapped</strong>
        </h2>
        <h2 class="centered fade-in-element">
          Energías renovadas
        </h2>
        <h2 class="centered fade-in-element">
          Experiencias nuevas
        </h2>
        <h2 class="centered fade-in-element">
          Desafíos únicos
        </h2>
      </div>
    </section>
  </body>
  <script>
    document.addEventListener("DOMContentLoaded", onPromoInit);

    function onPromoInit() {
      const hero = document.querySelector(".hero");
      const fadeElements = document.querySelectorAll(".fade-in-element");

      // Show the hero container immediately
      hero.classList.remove("hide");

      // Stagger the fade-in animation for each element
      let delay = 500; // Start after 500ms
      fadeElements.forEach((el, index) => {
        window.setTimeout(() => {
          el.classList.add("visible");
        }, delay + (index * 600)); // 600ms between each element
      });
    }
  </script>
